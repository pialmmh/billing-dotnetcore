# CCL — production profile for telcobright-billing-core.
# Same shape as profile-dev.yml; prod points at the HA config-manager + Kafka cluster
# and turns the config-event trigger on. Secrets (if any) come from OpenBao, not here.

billing:
  tenant:
    profiles:
      prod:
        name: "ccl78 prod"
        active: true
        environment: "production"

  config-manager:
    base-url: "http://10.9.9.2:7072"
    tenant-root-endpoint: "/get-specific-tenant-root"
    global-registry-endpoint: "/get-global-tenant-registry"
    timeout-seconds: 180

  config-events:
    enabled: true
    bootstrap-servers: "10.10.199.20:9092,10.10.198.20:9092,10.10.197.20:9092"
    event-topic-base: "config_event_loader"
    consumer-group-base: "billing-core-config-reload"
    debounce-ms: 3000
    idle-fast-path-multiplier: 2

  # DB for the post-call slice only (FinalizeAndSummarize). Credentials via OpenBao, never here.
  datasource:
    host: "103.95.96.77"
    port: 3306
    admin-db: "telcobright"
    reseller-db-prefix: "res_"
    secret-ref: "kv/billing/ccl78-prod-db"

  mediation:
    voice-enabled: true
    sms-enabled: false
    reseller-fanout-enabled: false
