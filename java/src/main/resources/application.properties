# ── telcobright-billing-core (Java/Quarkus) ──────────────────────────────────────────
# Faithful port of the .NET 8 service. gRPC only (no REST surface of its own).

# gRPC server: a dedicated server, plaintext h2c (the .NET service ran h2c too).
quarkus.grpc.server.use-separate-server=true
quarkus.grpc.server.host=0.0.0.0
quarkus.grpc.server.port=9000

# Quarkus still starts an HTTP server; keep it on a known port.
quarkus.http.port=8080

# Where the tenant config tree lives (tenants.yml + tenants/<t>/<env>/profile-<env>.yml).
# Read at runtime by ProfileConfigReader, mirroring the .NET ContentRootPath/config convention.
billing.config.dir=config

# Quieter Kafka client logs (the consumer/producer are best-effort; absence is valid).
quarkus.log.category."org.apache.kafka".level=WARN
