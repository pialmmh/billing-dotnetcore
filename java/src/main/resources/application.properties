# ── telcobright-billing-core (Java/Quarkus) ──────────────────────────────────────────
# Faithful port of the .NET 8 service. gRPC only (no REST surface of its own).

# gRPC server: a dedicated server, plaintext h2c (the .NET service ran h2c too).
quarkus.grpc.server.use-separate-server=true
quarkus.grpc.server.host=0.0.0.0
quarkus.grpc.server.port=9000

# Quarkus still starts an HTTP server; keep it on a known port.
quarkus.http.port=8080

# ── Tenant registry (routesphere convention) ─────────────────────────────────────────
# application.properties ENABLES/DISABLES each tenant and picks its ACTIVE profile — nothing more.
# The per-tenant/per-profile detail lives in
#   src/main/resources/config/tenants/<name>/<profile>/profile-<profile>.yml
# (read from the classpath by ProfileConfigReader). Add a tenant by appending tenants[N].* here and
# dropping its config folder; flip enabled=false to stop loading it.
billing.tenants[0].name=ccl78
billing.tenants[0].enabled=true
billing.tenants[0].profile=dev

# Optional: point this at an external, on-disk config dir to override the bundled tree without a rebuild
# (the deploy rsync model). When unset, the classpath config under src/main/resources/config is used.
# billing.config.dir=/etc/billing-core/config

# Quieter Kafka client logs (the consumer/producer are best-effort; absence is valid).
quarkus.log.category."org.apache.kafka".level=WARN
