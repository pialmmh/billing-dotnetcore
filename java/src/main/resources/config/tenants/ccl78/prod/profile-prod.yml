# CCL — production profile for telcobright-billing-core.
# Same shape as profile-dev.yml; prod points at the HA config-manager + Kafka cluster
# and turns the config-event trigger on. Secrets (if any) come from OpenBao, not here.

billing:
  tenant:
    profiles:
      prod:
        name: "ccl78 prod"
        active: true
        environment: "production"

  config-manager:
    base-url: "http://10.9.9.2:7072"
    tenant-root-endpoint: "/get-specific-tenant-root"
    global-registry-endpoint: "/get-global-tenant-registry"
    timeout-seconds: 180

  config-events:
    enabled: true
    bootstrap-servers: "10.10.199.20:9092,10.10.198.20:9092,10.10.197.20:9092"
    event-topic-base: "config_event_loader"
    consumer-group-base: "billing-core-config-reload"
    debounce-ms: 3000
    idle-fast-path-multiplier: 2

  # DB for the post-call / batch write slice. Credentials INLINE here for this project (no OpenBao).
  datasource:
    host: "103.95.96.77"
    port: 3306
    admin-db: "telcobright"
    reseller-db-prefix: "res_"
    username: ""                                           # CCL prod DB user — TODO: set
    password: ""                                           # CCL prod DB password — TODO: set

  mediation:
    voice-enabled: true
    sms-enabled: false
    reseller-fanout-enabled: false

  # Decoupled summary hand-off (outbox producer) — 100% config, NO env. Outbox is the only summary model;
  # this gates the best-effort Kafka ping (the durable hand-off is the summary_affected row, always written).
  summary:
    enabled: true                                         # outbox is THE summary model
    entity-type: "cdr"
    ping-topic: "cdr_summary_ping"
    bootstrap-servers: "10.10.199.20:9092,10.10.198.20:9092,10.10.197.20:9092"   # prod Kafka (same as config-events)

  # Decoupled summary ROLL-UP (outbox consumer) — folds each tenant's summary_affected rows into its
  # sum_voice_day/hr tables (BY service group: SG10->day_03/hr_03, SG11->day_02/hr_02; TUPLE-wise), advancing a
  # per-schema summary_offset cursor in the SAME tx. Disabled by default; flip enabled:true to fold live.
  summary-rollup:
    enabled: false
    entity-type: "cdr"
    poll-ms: 2000
    max-rows-per-poll: 500
    segment-size: 1000
